<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f9fafb; }
    h2 { font-size: 16px; margin: 0 0 15px 0; color: #111827; display: flex; align-items: center; }
    .btn { background: #4f46e5; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn:hover { background: #4338ca; }
    .setting { margin-top: 15px; font-size: 12px; color: #374151; display: flex; justify-content: space-between; align-items: center; }
    input[type="number"] { width: 60px; border: 1px solid #d1d5db; border-radius: 4px; padding: 2px 5px; }
    #error { margin-top: 10px; font-size: 11px; color: #b91c1c; min-height: 2.5em; }
  </style>
</head>
<body>
  <h2>Gnomad Capture</h2>
  <button id="capBtn" class="btn">Capture Full Page</button>
  <p id="error" role="alert"></p>
  
  <div class="setting">
    <label>Hide Sticky Elements</label>
    <input type="checkbox" id="sticky" checked>
  </div>
  <div class="setting">
    <label>Load Delay (ms)</label>
    <input type="number" id="delay" value="500">
  </div>
  <script src="popup.js"></script>
</body>
</html>
